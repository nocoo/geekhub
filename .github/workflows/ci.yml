name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  quality:
    uses: nocoo/base-ci/.github/workflows/bun-quality.yml@v2026
    with:
      test-command: "bun run test"
      typecheck-command: "bunx tsc --noEmit"
      osv-config: "osv-scanner.toml"
      enable-l2: "true"
      l2-command: "bash scripts/run-api-e2e.sh"
    secrets: inherit
